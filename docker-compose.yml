services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
    depends_on:
      - ai-service

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8001:8001"
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service:/app
